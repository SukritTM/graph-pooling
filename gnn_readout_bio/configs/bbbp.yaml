# BBBP (Blood-Brain Barrier Permeability) — binary classification, 2039 molecules
dataset: BBBP
data_root: ./data

# --- Model architecture ---
hidden_dim: 128
num_layers: 3
dropout: 0.3
num_heads: 4          # GAT only; hidden_dim must be divisible by num_heads

# --- Training ---
batch_size: 64
lr: 0.001
weight_decay: 1.0e-5
epochs: 100
patience: 20          # early stopping patience (epochs without val AUC improvement)

# --- Scaffold split ---
split: scaffold
train_frac: 0.8
val_frac: 0.1
test_frac: 0.1
split_dir: ./data/splits
